<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>MicroSpringBoot</title>
</head>

<body>
    <h1>MicroSpringBoot - IoC Web Framework</h1>

    <h2>Lambda Endpoints</h2>
    <ul>
        <li><a href="/App/hello">GET /App/hello</a></li>
        <li><a href="/App/hello?name=Pedro">GET /App/hello?name=Pedro</a></li>
        <li><a href="/App/pi">GET /App/pi</a></li>
        <li><a href="/App/euler">GET /App/euler</a></li>
    </ul>

    <h2>HelloController</h2>
    <ul>
        <li><a href="/">GET /</a></li>
        <li><a href="/hello">GET /hello</a></li>
        <li><a href="/pi">GET /pi</a></li>
    </ul>

    <h2>GreetingController</h2>
    <ul>
        <li><a href="/greeting?name=Juan">GET /greeting?name=Juan</a></li>
        <li><a href="/greeting">GET /greeting</a></li>
    </ul>
</body>

</html>
